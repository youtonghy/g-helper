name: Release

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to publish when running manually (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2022
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Normalize version from tag
      shell: pwsh
      run: |
        $appVersion = $env:TAG_NAME -replace '^v', ''
        if ([string]::IsNullOrWhiteSpace($appVersion)) {
          throw "Unable to derive app version from tag '$env:TAG_NAME'"
        }

        "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Publish
      run: |
        dotnet publish app/GHelper.sln --configuration Release --runtime win-x64 -p:PublishSingleFile=true --no-self-contained -p:Version=${{ env.APP_VERSION }} -p:AssemblyVersion=${{ env.APP_VERSION }} -p:FileVersion=${{ env.APP_VERSION }} -p:InformationalVersion=${{ env.APP_VERSION }} -p:SourceRevisionId=

    - name: Upload unsigned EXE
      id: upload-unsigned
      uses: actions/upload-artifact@v4
      with:
        path: app/bin/x64/Release/net8.0-windows/win-x64/publish/GHelper.exe

    - id: sign-exe
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
        project-slug: ${{ secrets.SIGNPATH_PROJECT }}
        signing-policy-slug: ${{ secrets.SIGNPATH_POLICY }}
        github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: './signed'

    - name: Create ZIP from signed EXE
      run: powershell Compress-Archive ./signed/GHelper.exe ./signed/GHelper.zip

    - name: Upload signed EXE and ZIP
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "${{ env.TAG_NAME }}" ./signed/GHelper.exe ./signed/GHelper.zip --clobber
    - name: Generate SLSA build provenance attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: |
          ./signed/GHelper.exe
          ./signed/GHelper.zip
